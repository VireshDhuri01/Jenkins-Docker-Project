<!DOCTYPE html>
<html>
<head>
    <title>DevOps Task Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🚀 DevOps Task Manager</h1>

    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="Enter new task..." required>
        <button type="submit">Add Task</button>
    </form>

    <ul>
        {% for task in tasks %}
        <li>
            <span class="{{ 'done' if task[2]=='Done' else '' }}">
                {{ task[1] }} - {{ task[2] }}
            </span>

            <div class="actions">
                <a href="/update/{{task[0]}}">✔</a>
                <a href="/delete/{{task[0]}}">❌</a>
            </div>
        </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
