version: "3.8"
services:
  web:
    build: ./frontend
    container_name: myapp-frontend
    ports:
      - 5000:5000
    networks:
      - netapp
    environment:
      - MYSQL_HOST=sqlcontainer
      - MYSQL_USER=root
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DB=taskdb
    restart: always
    depends_on:
      - mysql

  mysql:
    image: mysql
    container_name: sqlcontainer
    restart: always
    environment: 
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - 3306:3306
    networks:
      - netapp
    volumes:
      - volapp:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

networks:
  netapp:
volumes:
  volapp: